# ============================================
# PRODUCTION CONFIGURATION (AWS)
# ============================================
# Activate with: SPRING_PROFILES_ACTIVE=prod

# 1. PostgreSQL Database (RDS)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# 2. Hibernate/JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# 3. H2 Console DISABLED in production
spring.h2.console.enabled=false

# 4. File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 5. Stripe (from environment variables)
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# 6. JWT Secret (from environment variable)
jwt.secret=${JWT_SECRET}

# 7. CORS allowed origin (your production domain)
app.cors.allowed-origin=${CORS_ORIGIN:https://knowledgeforgeacademy.com}

# 8. Server Configuration
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# 9. Actuator (health checks for ALB)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false
