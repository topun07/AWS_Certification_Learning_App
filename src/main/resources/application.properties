# ============================================
# DEVELOPMENT CONFIGURATION (Local)
# ============================================

# 1. H2 Database (local dev only)
spring.datasource.url=jdbc:h2:file:./data/awshub_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Hibernate/JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# 3. H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 4. File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 5. Stripe (use env vars or fallback to test keys for local dev)
stripe.api.key=${STRIPE_API_KEY:sk_test_REPLACE_WITH_YOUR_TEST_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_REPLACE_WITH_YOUR_TEST_WEBHOOK_SECRET}

# 6. JWT Secret (env var with fallback for local dev)
jwt.secret=${JWT_SECRET:replace-with-your-local-dev-secret}

# 7. CORS
app.cors.allowed-origin=${CORS_ORIGIN:http://localhost:5173}

# 8. AWS Bedrock (AI Tutor)
aws.bedrock.region=${AWS_REGION:us-east-1}

# ===============================
# KNOWLEDGE FORGE EMAIL SERVERS
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_NEW_WORKSPACE_EMAIL@knowledgeforgeacademy.com
spring.mail.password=REPLACE_WITH_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Admin & Mailchimp
app.mail.from=noreply@knowledgeforgeacademy.com
app.admin.email=aaron@knowledgeforgeacademy.com
mailchimp.api.key=
mailchimp.audience.id=